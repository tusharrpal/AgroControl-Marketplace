{% extends "base.html" %}

{% block title %}Edit Profile | AgroControl{% endblock %}

{% block content %}
<div class="auth-wrapper py-4">
    <div class="auth-card auth-card-wide shadow-sm">
        <span class="eyebrow">Account settings</span>
        <h1 class="h2 mb-4">Edit Profile</h1>
        <form method="post" enctype="multipart/form-data" novalidate>
            {% include "users/includes/profile_form_fields.html" %}
            <div class="d-flex gap-2">
                <button class="btn btn-success" type="submit">Save Changes</button>
                <a class="btn btn-outline-secondary" href="{% url 'profile' %}">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
