{% extends "base.html" %}

{% block title %}Delete {{ crop.name }} | AgroControl{% endblock %}

{% block content %}
{% include "users/includes/dashboard_nav.html" %}
<div class="dashboard-form mx-auto bg-white rounded-3 shadow-sm p-4 p-md-5 text-center">
    <div class="auth-icon text-danger bg-danger-subtle"><i class="bi bi-trash"></i></div>
    <h1 class="h2 mt-3">Delete {{ crop.name }}?</h1>
    <p class="text-secondary">This crop will be permanently removed from your listings.</p>
    <form method="post">
        {% csrf_token %}
        <button class="btn btn-danger" type="submit">Yes, Delete Crop</button>
        <a class="btn btn-outline-secondary" href="{% url 'my_crops' %}">Cancel</a>
    </form>
</div>
{% endblock %}
