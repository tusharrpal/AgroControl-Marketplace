{% extends "base.html" %}

{% block title %}Change Password | AgroControl{% endblock %}

{% block content %}
<div class="auth-wrapper py-4">
    <div class="auth-card shadow-sm">
        <span class="eyebrow">Account security</span>
        <h1 class="h2 mb-4">Change Password</h1>
        <form method="post" novalidate>
            {% include "users/includes/profile_form_fields.html" %}
            <div class="d-flex gap-2">
                <button class="btn btn-success" type="submit">Change Password</button>
                <a class="btn btn-outline-secondary" href="{% url 'profile' %}">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
